<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The CMG Brand Guides</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .logo {
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -1px;
            margin-bottom: 20px;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">The CMG</div>
        <h1>Brand Guide Portal</h1>
        <p>Please access your brand guide using the direct link provided by your account manager.</p>
    </div>
</body>

</html>
