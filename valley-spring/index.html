<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley Spring Brand Guide</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .swatch {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Valley Spring Brand Guide</h1>
    <p>This is a sample brand guide.</p>
    <div class="color-palette">
        <div class="swatch" style="background: #e74c3c;">#e74c3c</div>
        <div class="swatch" style="background: #3498db;">#3498db</div>
        <div class="swatch" style="background: #2ecc71;">#2ecc71</div>
    </div>
</body>

</html>
